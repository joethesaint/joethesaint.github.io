<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NERV Interface — Upgraded</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Hallmark Premium Atmospheric/Technical Palette */
      --bg: oklch(14% 0.02 260);
      --surface: oklch(18% 0.02 260);
      --border: oklch(35% 0.1 35);
      --orange: oklch(65% 0.25 35);
      --cyan: oklch(75% 0.15 220);
      --text: oklch(92% 0.01 260);
      --text-muted: oklch(65% 0.02 260);
      --mono: 'JetBrains Mono', monospace;
      --display: 'Space Grotesk', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: var(--mono);
      text-transform: uppercase;
    }
    
    body {
      background-color: var(--bg);
      color: var(--text);
      overflow: hidden;
      position: relative;
      letter-spacing: -0.02em;
    }
    
    /* Premium CRT scanline effect */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.15),
        rgba(0, 0, 0, 0.15) 1px,
        transparent 1px,
        transparent 2px
      );
      z-index: 100;
      pointer-events: none;
    }
    
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, transparent 50%, rgba(0, 0, 0, 0.4) 100%);
      z-index: 110;
      pointer-events: none;
    }
    
    #app {
      display: grid;
      grid-template-columns: 1fr 420px;
      grid-template-rows: 90px 1fr 90px;
      height: 100vh;
      padding: 1.5rem;
      gap: 1.5rem;
      z-index: 10;
      position: relative;
    }
    
    header {
      grid-column: 1 / -1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid var(--border);
      padding: 0 2rem;
      background: linear-gradient(135deg, rgba(255, 72, 0, 0.05), transparent);
      box-shadow: inset 0 0 20px rgba(255, 72, 0, 0.05);
    }
    
    .logo {
      color: var(--orange);
      font-family: var(--display);
      font-weight: 700;
      font-size: 2.5rem;
      letter-spacing: -0.05em;
      display: flex;
      align-items: center;
      text-shadow: 0 0 10px rgba(255, 72, 0, 0.5);
    }
    
    .logo::before {
      content: '';
      display: inline-block;
      width: 0;
      height: 0;
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-bottom: 24px solid var(--orange);
      margin-right: 15px;
      filter: drop-shadow(0 0 5px var(--orange));
    }
    
    .logo-area {
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    
    .system-nav {
      display: flex;
      gap: 1rem;
    }
    
    .nav-btn {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 0.3rem 0.8rem;
      border: 1px solid transparent;
      transition: all 0.3s ease;
      font-family: var(--display);
    }
    
    .nav-btn:hover {
      color: var(--orange);
      border-color: rgba(255, 72, 0, 0.3);
      text-shadow: 0 0 8px rgba(255, 72, 0, 0.5);
    }
    
    .nav-btn.active {
      color: var(--cyan);
      border-color: var(--cyan);
      box-shadow: inset 0 0 10px rgba(0, 255, 255, 0.2);
      text-shadow: 0 0 8px rgba(0, 255, 255, 0.5);
    }
    
    .status {
      color: var(--cyan);
      font-size: 1.1rem;
      font-weight: 700;
      animation: blink 2s infinite;
      text-shadow: 0 0 8px rgba(0, 255, 255, 0.5);
    }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    
    .time {
      color: var(--text);
      font-size: 1.4rem;
      font-weight: 700;
    }
    
    main {
      grid-column: 1;
      grid-row: 2;
      position: relative;
      border: 1px solid var(--border);
      background-color: var(--surface);
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
      overflow: hidden;
    }
    
    #sphere-container {
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 2;
    }
    
    aside {
      grid-column: 2;
      grid-row: 2;
      border: 1px solid var(--border);
      background-color: var(--surface);
      padding: 1.5rem;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    
    .data-panel {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--orange) transparent;
      padding-right: 1rem;
    }
    
    .data-section {
      margin-bottom: 2.5rem;
    }
    
    .data-section h3 {
      color: var(--orange);
      margin-bottom: 1rem;
      border-bottom: 2px solid var(--border);
      padding-bottom: 0.5rem;
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-shadow: 0 0 5px rgba(255, 72, 0, 0.3);
    }
    
    .data-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    
    .data-item {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      background: rgba(0,0,0,0.2);
      padding: 0.8rem;
      border: 1px solid rgba(255,255,255,0.05);
      transition: all 0.2s ease;
      cursor: crosshair;
    }
    
    .data-item:hover {
      background: rgba(0, 255, 255, 0.1);
      border-color: var(--cyan);
      transform: translateX(5px);
      box-shadow: -5px 0 0 var(--cyan);
    }
    
    .data-label {
      color: var(--text-muted);
      font-size: 0.75rem;
      font-weight: 700;
    }
    
    .data-value {
      color: var(--cyan);
      font-size: 1rem;
      font-weight: 700;
      text-shadow: 0 0 5px rgba(0, 255, 255, 0.4);
    }
    
    .warning {
      color: var(--bg);
      background-color: var(--orange);
      padding: 0.8rem;
      font-size: 0.95rem;
      font-weight: 800;
      text-align: center;
      animation: warning-pulse 1s infinite;
      box-shadow: 0 0 15px rgba(255, 72, 0, 0.3);
    }
    
    @keyframes warning-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.8; background-color: oklch(50% 0.2 35); }
    }
    
    .status-bar {
      height: 8px;
      background-color: rgba(0, 0, 0, 0.5);
      margin: 1.5rem 0;
      position: relative;
      border: 1px solid var(--border);
    }
    
    .status-fill {
      height: 100%;
      background-color: var(--cyan);
      width: 75%;
      box-shadow: 0 0 10px var(--cyan);
      transition: width 0.5s ease;
    }
    
    .hexagon-grid {
      display: flex;
      justify-content: space-between;
      margin: 1.5rem 0;
    }
    
    .hexagon {
      width: 40px;
      height: 46px;
      background-color: transparent;
      position: relative;
      border: 1px solid var(--cyan);
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      transition: all 0.3s ease;
      opacity: 0.3;
    }
    
    .hexagon.active {
      background-color: var(--cyan);
      opacity: 0.8;
      box-shadow: 0 0 15px var(--cyan);
    }
    
    .terminal {
      color: var(--cyan);
      font-size: 0.85rem;
      line-height: 1.5;
      margin-top: 1rem;
      height: 200px;
      overflow-y: auto;
      position: relative;
      background: rgba(0,0,0,0.3);
      padding: 1rem;
      border: 1px solid var(--border);
    }
    
    .terminal-line {
      margin-bottom: 0.3rem;
      opacity: 0;
      transform: translateY(10px);
      animation: terminal-entry 0.3s forwards;
    }
    
    @keyframes terminal-entry {
      to { opacity: 1; transform: translateY(0); }
    }
    
    footer {
      grid-column: 1 / -1;
      grid-row: 3;
      border: 1px solid var(--border);
      background-color: var(--surface);
      padding: 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .command-line {
      display: flex;
      align-items: center;
      width: 100%;
      font-size: 1.2rem;
    }
    
    .command-prompt {
      color: var(--orange);
      margin-right: 1.5rem;
      font-weight: 800;
    }
    
    .command-input {
      background-color: transparent;
      border: none;
      color: var(--text);
      font-family: var(--mono);
      font-size: 1.2rem;
      width: 100%;
      outline: none;
      font-weight: 700;
    }
    
    .command-input::placeholder {
      color: var(--text-muted);
    }
    
    .grid-lines {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 1;
    }
    
    .h-line, .v-line {
      position: absolute;
      background-color: rgba(255, 72, 0, 0.1);
    }
    
    .h-line { height: 1px; width: 100%; }
    .v-line { width: 1px; height: 100%; }
    
    .hebrew-char {
      position: absolute;
      color: rgba(255, 72, 0, 0.15);
      font-family: serif;
      font-size: 2rem;
      z-index: 1;
      pointer-events: none;
    }
    
    /* Micro-animations */
    .command-input:focus {
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
    }
    
    @keyframes spin { 100% { transform: rotate(360deg); } }
    
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="logo-area">
        <div class="logo">NERV</div>
        <nav class="system-nav">
          <a href="evangelion-sphere-ui.html" class="nav-btn active">SPHERE</a>
          <a href="evangelion-dna-ui.html" class="nav-btn">GENOME</a>
          <a href="evangelion-boids-ui.html" class="nav-btn">SWARM</a>
        </nav>
      </div>
      <div class="status">SYSTEM STATUS: NORMAL</div>
      <div class="time">T-MINUS 24:15:37</div>
    </header>
    
    <main>
      <div id="sphere-container"></div>
      
      <!-- Target cross overlay -->
      <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; display: flex; justify-content: center; align-items: center;">
        <div style="position: relative; width: 400px; height: 400px;">
          <div style="position: absolute; top: 50%; left: -50px; width: calc(100% + 100px); height: 1px; background-color: rgba(255, 72, 0, 0.4); transform: translateY(-50%);"></div>
          <div style="position: absolute; top: -50px; left: 50%; width: 1px; height: calc(100% + 100px); background-color: rgba(255, 72, 0, 0.4); transform: translateX(-50%);"></div>
          <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 1px solid rgba(255, 72, 0, 0.2); border-radius: 50%;"></div>
          <div style="position: absolute; top: 15%; left: 15%; width: 70%; height: 70%; border: 1px dashed rgba(255, 72, 0, 0.15); border-radius: 50%; animation: spin 20s linear infinite;"></div>
        </div>
      </div>
      
      <div class="grid-lines"></div>
      <div class="hebrew-chars" aria-hidden="true"></div>
    </main>
    
    <aside>
      <div class="data-panel">
        <div class="data-section">
          <h3>SPHERE ANALYSIS</h3>
          <div class="status-bar">
            <div class="status-fill"></div>
          </div>
          <div class="data-grid">
            <div class="data-item">
              <span class="data-label">RADIUS</span>
              <span class="data-value">2.35m</span>
            </div>
            <div class="data-item">
              <span class="data-label">DENSITY</span>
              <span class="data-value">5.67g/cm³</span>
            </div>
            <div class="data-item">
              <span class="data-label">TEMP</span>
              <span class="data-value">26.8°C</span>
            </div>
            <div class="data-item">
              <span class="data-label">MASS</span>
              <span class="data-value">189.4kg</span>
            </div>
            <div class="data-item">
              <span class="data-label">PATTERN</span>
              <span class="data-value">BLUE</span>
            </div>
            <div class="data-item">
              <span class="data-label">ROTATION</span>
              <span class="data-value">8.7°/s</span>
            </div>
          </div>
          <div class="warning">WARNING: UNUSUAL ENERGY SIGNATURE</div>
        </div>
        
        <div class="data-section">
          <h3>CONFIGURATION</h3>
          <div class="hexagon-grid">
            <div class="hexagon active"></div>
            <div class="hexagon"></div>
            <div class="hexagon active"></div>
            <div class="hexagon"></div>
            <div class="hexagon active"></div>
          </div>
          <div class="data-grid">
            <div class="data-item">
              <span class="data-label">SYNC</span>
              <span class="data-value">84.3%</span>
            </div>
            <div class="data-item">
              <span class="data-label">HARMONIC</span>
              <span class="data-value">NORMAL</span>
            </div>
            <div class="data-item">
              <span class="data-label">WAVE</span>
              <span class="data-value">PATTERN-A</span>
            </div>
            <div class="data-item">
              <span class="data-label">MODE</span>
              <span class="data-value">OBSERVATION</span>
            </div>
          </div>
        </div>
        
        <div class="data-section">
          <h3>MAGI LOGS</h3>
          <div class="terminal" id="terminal">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>
    </aside>
    
    <footer>
      <div class="command-line">
        <span class="command-prompt">NERV></span>
        <input type="text" class="command-input" placeholder="ANALYZE SPHERE COMPOSITION" aria-label="Command input" spellcheck="false">
      </div>
    </footer>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script>
    // --- 3D Scene ---
    const container = document.getElementById('sphere-container');
    const scene = new THREE.Scene();
    
    const camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.z = 6;
    
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);
    
    // Add OrbitControls for interactivity
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.enableZoom = true;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 2.0;
    
    const ambientLight = new THREE.AmbientLight(0x222222);
    scene.add(ambientLight);
    
    const directionalLight = new THREE.DirectionalLight(0xff5500, 1.5);
    directionalLight.position.set(2, 2, 2);
    scene.add(directionalLight);
    
    const blueLight = new THREE.PointLight(0x00ffff, 2, 10);
    blueLight.position.set(-2, -1, 3);
    scene.add(blueLight);
    
    const geometry = new THREE.IcosahedronGeometry(2, 4); // More complex, angelic geometry
    
    // Wireframe with additive blending for holographic look
    const wireframe = new THREE.WireframeGeometry(geometry);
    const lineMaterial = new THREE.LineBasicMaterial({ 
      color: 0x00ffff, 
      transparent: true, 
      opacity: 0.6,
      blending: THREE.AdditiveBlending
    });
    const wireframeMesh = new THREE.LineSegments(wireframe, lineMaterial);
    
    // Inner core with phong
    const innerMaterial = new THREE.MeshPhongMaterial({
      color: 0x0044ff,
      emissive: 0x001133,
      transparent: true,
      opacity: 0.4,
      shininess: 100,
      blending: THREE.AdditiveBlending
    });
    const sphere = new THREE.Mesh(geometry, innerMaterial);
    sphere.scale.set(0.95, 0.95, 0.95);
    
    const sphereGroup = new THREE.Group();
    sphereGroup.add(wireframeMesh);
    sphereGroup.add(sphere);
    scene.add(sphereGroup);
    
    function animate() {
      requestAnimationFrame(animate);
      
      controls.update(); // Required for damping and autoRotate
      
      const pulse = 0.95 + 0.02 * Math.sin(Date.now() * 0.002);
      sphere.scale.set(pulse, pulse, pulse);
      
      // Glitch effect on wireframe
      if (Math.random() > 0.95) {
        lineMaterial.opacity = 0.2 + Math.random() * 0.8;
      } else {
        lineMaterial.opacity = 0.6;
      }
      
      renderer.render(scene, camera);
    }
    
    window.addEventListener('resize', () => {
      const w = container.clientWidth;
      const h = container.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    });
    
    // --- UI Logic ---
    const gridLines = document.querySelector('.grid-lines');
    for (let i = 1; i < 10; i++) {
      const hLine = document.createElement('div');
      hLine.classList.add('h-line');
      hLine.style.top = `${i * 10}%`;
      gridLines.appendChild(hLine);
      const vLine = document.createElement('div');
      vLine.classList.add('v-line');
      vLine.style.left = `${i * 10}%`;
      gridLines.appendChild(vLine);
    }
    
    const hebrewChars = 'אבגדהוזחטיכלמנסעפצקרשת';
    const main = document.querySelector('main');
    for (let i = 0; i < 8; i++) {
      const char = document.createElement('div');
      char.classList.add('hebrew-char');
      char.textContent = hebrewChars[Math.floor(Math.random() * hebrewChars.length)];
      char.style.left = `${Math.random() * 80 + 10}%`;
      char.style.top = `${Math.random() * 80 + 10}%`;
      char.style.transform = `rotate(${Math.random() * 360}deg) scale(${Math.random() + 0.5})`;
      main.appendChild(char);
    }
    
    const hexagons = document.querySelectorAll('.hexagon');
    setInterval(() => {
      const r = Math.floor(Math.random() * hexagons.length);
      hexagons[r].classList.toggle('active');
    }, 1500);
    
    const timeDisplay = document.querySelector('.time');
    let totalSeconds = 24 * 3600 + 15 * 60 + 37;
    setInterval(() => {
      totalSeconds--;
      const h = Math.floor(totalSeconds / 3600);
      const m = Math.floor((totalSeconds % 3600) / 60);
      const s = totalSeconds % 60;
      timeDisplay.textContent = `T-MINUS ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }, 1000);

    // --- Dynamic Terminal ---
    const logs = [
      "0xFF872A > INITIALIZING SCAN SEQUENCE",
      "0xFF872B > CALIBRATING SENSORS",
      "0xFF872C > ADJUSTING FOR ATMOSPHERIC INTERFERENCE",
      "0xFF872D > DEPLOYING DETECTION GRID",
      "0xFF872E > SCANNING... 17%",
      "0xFF872F > SCANNING... 34%",
      "0xFF8730 > SCANNING... 52%",
      "0xFF8731 > SCANNING... 68%",
      "0xFF8732 > SCANNING... 85%",
      "0xFF8733 > SCANNING... 99%",
      "0xFF8734 > SCAN COMPLETE",
      "0xFF8735 > ANALYZING RESULTS",
      "0xFF8736 > PATTERN MATCH: BLUE",
      "0xFF8737 > ALERT LEVEL: YELLOW",
      "0xFF8738 > INITIATING SECONDARY SCAN",
      "0xFF8739 > SYNCHRONIZING WITH MAGI",
      "0xFF873A > CALCULATING TRAJECTORY",
      "0xFF873B > PROJECTION: 87% ACCURACY",
      "0xFF873C > CORE DETECTED",
      "0xFF873D > UNUSUAL ENERGY SIGNATURE FOUND",
      "0xFF873E > CROSS-REFERENCING DATABASE",
      "0xFF873F > NO MATCHES FOUND",
      "0xFF8740 > AWAITING INSTRUCTIONS"
    ];
    
    const terminal = document.getElementById('terminal');
    let logIndex = 0;
    let autoLogTimer;
    
    function addLog(customMessage = null) {
      if (terminal.children.length > 50) {
        terminal.removeChild(terminal.firstChild);
      }
      
      const line = document.createElement('div');
      line.className = 'terminal-line';
      line.textContent = customMessage ? customMessage : logs[logIndex % logs.length];
      
      if (customMessage) {
        line.style.color = "var(--orange)";
      }
      
      terminal.appendChild(line);
      terminal.scrollTop = terminal.scrollHeight;
      
      if (!customMessage) {
        logIndex++;
        autoLogTimer = setTimeout(() => addLog(), Math.random() * 800 + 200);
      }
    }
    
    addLog();
    animate();

    // Gamified Command Line Interactivity
    const cmdInput = document.querySelector('.command-input');
    cmdInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        const val = this.value.trim().toUpperCase();
        if (val === '') return;
        
        addLog(`> USER_CMD: ${val}`);
        this.value = '';
        
        setTimeout(() => {
          if (val === 'SWARM') {
            addLog("0xFF0000 > REDIRECTING TO SWARM ANALYSIS...");
            setTimeout(() => window.location.href = 'evangelion-boids-ui.html', 1000);
          } else if (val === 'GENOME' || val === 'DNA') {
            addLog("0xFF0000 > REDIRECTING TO GENOMIC ANALYSIS...");
            setTimeout(() => window.location.href = 'evangelion-dna-ui.html', 1000);
          } else if (val === 'CLEAR') {
            if (autoLogTimer) clearTimeout(autoLogTimer);
            terminal.innerHTML = '';
          } else if (val === 'HELP') {
            addLog('AVAILABLE: SPHERE | GENOME | DNA | SWARM | CLEAR | HELP');
          } else {
            addLog("0xFF0000 > COMMAND NOT RECOGNIZED BY MAGI SYSTEM");
            // Flash red
            document.body.style.background = 'rgba(255, 0, 0, 0.1)';
            setTimeout(() => document.body.style.background = 'var(--bg)', 200);
          }
        }, 500);
      }
    });
  </script>
</body>
</html>
