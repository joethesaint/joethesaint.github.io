<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NERV Interface — Swarm Dynamics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: oklch(14% 0.02 260);
      --surface: oklch(18% 0.02 260);
      --border: oklch(35% 0.1 35);
      --orange: oklch(65% 0.25 35);
      --cyan: oklch(75% 0.15 220);
      --text: oklch(92% 0.01 260);
      --text-muted: oklch(65% 0.02 260);
      --mono: 'JetBrains Mono', monospace;
      --display: 'Space Grotesk', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--mono); text-transform: uppercase; }
    body { background-color: var(--bg); color: var(--text); overflow: hidden; position: relative; letter-spacing: -0.02em; }
    
    body::before {
      content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.15) 1px, transparent 1px, transparent 2px);
      z-index: 100; pointer-events: none;
    }
    
    body::after {
      content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at center, transparent 50%, rgba(0, 0, 0, 0.4) 100%);
      z-index: 110; pointer-events: none;
    }
    
    #app {
      display: grid; grid-template-columns: 1fr 420px; grid-template-rows: 90px 1fr 90px;
      height: 100vh; padding: 1.5rem; gap: 1.5rem; z-index: 10; position: relative;
    }
    
    header {
      grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center;
      border: 1px solid var(--border); padding: 0 2rem;
      background: linear-gradient(135deg, rgba(255, 72, 0, 0.05), transparent);
      box-shadow: inset 0 0 20px rgba(255, 72, 0, 0.05);
    }
    
    .logo-area { display: flex; align-items: center; gap: 2rem; }
    .system-nav { display: flex; gap: 1rem; }
    .nav-btn {
      color: var(--text-muted); text-decoration: none; font-size: 1.1rem;
      font-weight: 700; padding: 0.3rem 0.8rem; border: 1px solid transparent;
      transition: all 0.3s ease; font-family: var(--display);
    }
    .nav-btn:hover { color: var(--orange); border-color: rgba(255, 72, 0, 0.3); text-shadow: 0 0 8px rgba(255, 72, 0, 0.5); }
    .nav-btn.active { color: var(--cyan); border-color: var(--cyan); box-shadow: inset 0 0 10px rgba(0, 255, 255, 0.2); text-shadow: 0 0 8px rgba(0, 255, 255, 0.5); }
    .logo { color: var(--orange); font-family: var(--display); font-weight: 700; font-size: 2.5rem; letter-spacing: -0.05em; display: flex; align-items: center; text-shadow: 0 0 10px rgba(255, 72, 0, 0.5); }
    .logo::before { content: ''; display: inline-block; width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-bottom: 24px solid var(--orange); margin-right: 15px; filter: drop-shadow(0 0 5px var(--orange)); }
    .status { color: var(--cyan); font-size: 1.1rem; font-weight: 700; animation: blink 2s infinite; text-shadow: 0 0 8px rgba(0, 255, 255, 0.5); }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .time { color: var(--text); font-size: 1.4rem; font-weight: 700; }
    
    main {
      grid-column: 1; grid-row: 2; position: relative; border: 1px solid var(--border);
      background-color: var(--surface); display: flex; justify-content: center; align-items: center;
      box-shadow: inset 0 0 50px rgba(0,0,0,0.5); overflow: hidden;
    }
    
    #boids-container { width: 100%; height: 100%; position: relative; z-index: 2; }
    
    aside {
      grid-column: 2; grid-row: 2; border: 1px solid var(--border); background-color: var(--surface);
      padding: 1.5rem; overflow: hidden; position: relative; display: flex; flex-direction: column;
    }
    
    .data-panel { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--orange) transparent; padding-right: 1rem; }
    .data-section { margin-bottom: 2.5rem; }
    .data-section h3 { color: var(--orange); margin-bottom: 1rem; border-bottom: 2px solid var(--border); padding-bottom: 0.5rem; font-size: 1.2rem; font-weight: 800; letter-spacing: 0.05em; text-shadow: 0 0 5px rgba(255, 72, 0, 0.3); }
    .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
    .data-item { display: flex; flex-direction: column; gap: 0.2rem; background: rgba(0,0,0,0.2); padding: 0.8rem; border: 1px solid rgba(255,255,255,0.05); transition: all 0.2s ease; cursor: crosshair; }
    .data-item:hover { background: rgba(0, 255, 255, 0.1); border-color: var(--cyan); transform: translateX(5px); box-shadow: -5px 0 0 var(--cyan); }
    .data-label { color: var(--text-muted); font-size: 0.75rem; font-weight: 700; }
    .data-value { color: var(--cyan); font-size: 1rem; font-weight: 700; text-shadow: 0 0 5px rgba(0, 255, 255, 0.4); }
    .warning { color: var(--bg); background-color: var(--cyan); padding: 0.8rem; font-size: 0.95rem; font-weight: 800; text-align: center; animation: warning-pulse 1s infinite; box-shadow: 0 0 15px rgba(0, 255, 255, 0.3); }
    @keyframes warning-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; background-color: oklch(50% 0.15 220); } }
    .status-bar { height: 8px; background-color: rgba(0, 0, 0, 0.5); margin: 1.5rem 0; position: relative; border: 1px solid var(--border); }
    .status-fill { height: 100%; background-color: var(--cyan); width: 95%; box-shadow: 0 0 10px var(--cyan); transition: width 0.5s ease; }
    
    .terminal { color: var(--cyan); font-size: 0.85rem; line-height: 1.5; margin-top: 1rem; height: 250px; overflow-y: auto; position: relative; background: rgba(0,0,0,0.3); padding: 1rem; border: 1px solid var(--border); }
    .terminal-line { margin-bottom: 0.3rem; opacity: 0; transform: translateY(10px); animation: terminal-entry 0.3s forwards; }
    @keyframes terminal-entry { to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    footer { grid-column: 1 / -1; grid-row: 3; border: 1px solid var(--border); background-color: var(--surface); padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; }
    .command-line { display: flex; align-items: center; width: 100%; font-size: 1.2rem; }
    .command-prompt { color: var(--orange); margin-right: 1.5rem; font-weight: 800; }
    .command-input { background-color: transparent; border: none; color: var(--text); font-family: var(--mono); font-size: 1.2rem; width: 100%; outline: none; font-weight: 700; }
    .command-input::placeholder { color: var(--text-muted); }
    .command-input:focus { text-shadow: 0 0 8px rgba(255, 255, 255, 0.3); }
    
    .grid-lines { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 1; }
    .h-line, .v-line { position: absolute; background-color: rgba(255, 72, 0, 0.1); }
    .h-line { height: 1px; width: 100%; }
    .v-line { width: 1px; height: 100%; }
    .hebrew-char { position: absolute; color: rgba(255, 72, 0, 0.15); font-family: serif; font-size: 2rem; z-index: 1; pointer-events: none; }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="logo-area">
        <div class="logo">NERV</div>
        <nav class="system-nav">
          <a href="evangelion-sphere-ui.html" class="nav-btn">SPHERE</a>
          <a href="evangelion-dna-ui.html" class="nav-btn">GENOME</a>
          <a href="evangelion-boids-ui.html" class="nav-btn active">SWARM</a>
        </nav>
      </div>
      <div class="status">SYSTEM STATUS: OBSERVING</div>
      <div class="time">T-MINUS 24:15:37</div>
    </header>
    
    <main>
      <div id="boids-container"></div>
      
      <!-- Target cross overlay -->
      <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; display: flex; justify-content: center; align-items: center;">
        <div style="position: relative; width: 400px; height: 400px;">
          <div style="position: absolute; top: 50%; left: -50px; width: calc(100% + 100px); height: 1px; background-color: rgba(0, 255, 255, 0.2); transform: translateY(-50%);"></div>
          <div style="position: absolute; top: -50px; left: 50%; width: 1px; height: calc(100% + 100px); background-color: rgba(0, 255, 255, 0.2); transform: translateX(-50%);"></div>
          <div style="position: absolute; top: 15%; left: 15%; width: 70%; height: 70%; border: 1px dashed rgba(255, 72, 0, 0.15); border-radius: 50%; animation: spin 20s linear infinite;"></div>
        </div>
      </div>
      
      <div class="grid-lines"></div>
      <div class="hebrew-chars"></div>
    </main>
    
    <aside>
      <div class="data-panel">
        <div class="data-section">
          <h3>SWARM DYNAMICS</h3>
          <div class="status-bar">
            <div class="status-fill"></div>
          </div>
          <div class="data-grid">
            <div class="data-item">
              <span class="data-label">ENTITIES</span>
              <span class="data-value">80</span>
            </div>
            <div class="data-item">
              <span class="data-label">COHESION</span>
              <span class="data-value">1.0</span>
            </div>
            <div class="data-item">
              <span class="data-label">ALIGNMENT</span>
              <span class="data-value">1.0</span>
            </div>
            <div class="data-item">
              <span class="data-label">SEPARATION</span>
              <span class="data-value">1.6</span>
            </div>
          </div>
          <div class="warning">NOTICE: SWARM INTELLIGENCE EMERGING</div>
        </div>
        
        <div class="data-section">
          <h3>VECTOR ANALYSIS</h3>
          <div class="data-grid">
            <div class="data-item">
              <span class="data-label">MAX SPEED</span>
              <span class="data-value">1.6</span>
            </div>
            <div class="data-item">
              <span class="data-label">MAX FORCE</span>
              <span class="data-value">0.04</span>
            </div>
            <div class="data-item">
              <span class="data-label">BEHAVIOR</span>
              <span class="data-value">FLOCKING</span>
            </div>
            <div class="data-item">
              <span class="data-label">PATTERN</span>
              <span class="data-value">NON-EUCLIDEAN</span>
            </div>
          </div>
        </div>
        
        <div class="data-section">
          <h3>MAGI TRACKING</h3>
          <div class="terminal" id="terminal">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>
    </aside>
    
    <footer>
      <div class="command-line">
        <span class="command-prompt">NERV></span>
        <input type="text" class="command-input" placeholder="TRACK MULTIPLE TARGETS" aria-label="Command input" spellcheck="false">
      </div>
    </footer>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // --- Portfolio Three.js Boids Simulation ---
    const container = document.getElementById('boids-container');
    let renderer, scene, camera;
    let boids = [];
    let animationFrameId;
    let boidMaterialOrange, boidMaterialCyan;

    let mouse = new THREE.Vector2();
    let mouseActive = false;
    const raycaster = new THREE.Raycaster();

    const BOID_COUNT = 80; 
    const BOUNDS = 85;
    const MAX_SPEED = 1.6;
    const MAX_FORCE = 0.04;

    const SEPARATION_DIST_SQ = 12 * 12;
    const ALIGN_DIST_SQ = 30 * 30;
    const COHESION_DIST_SQ = 30 * 30;

    const SEPARATION_WEIGHT = 1.6;
    const ALIGN_WEIGHT = 1.0;
    const COHESION_WEIGHT = 1.0;

    const tempDiff = new THREE.Vector3();
    const tempSep = new THREE.Vector3();
    const tempAlign = new THREE.Vector3();
    const tempCoh = new THREE.Vector3();
    const tempSteer = new THREE.Vector3();

    class Boid {
      constructor(material) {
        this.position = new THREE.Vector3(
          (Math.random() - 0.5) * BOUNDS,
          (Math.random() - 0.5) * BOUNDS,
          (Math.random() - 0.5) * BOUNDS
        );

        this.velocity = new THREE.Vector3(
          (Math.random() - 0.5) * 2,
          (Math.random() - 0.5) * 2,
          (Math.random() - 0.5) * 2
        ).normalize().multiplyScalar(Math.random() * MAX_SPEED);

        this.acceleration = new THREE.Vector3();

        // Exact geometry from the portfolio
        const geometry = new THREE.ConeGeometry(0.4, 1.8, 4);
        geometry.rotateX(Math.PI / 2);
        
        this.mesh = new THREE.Mesh(geometry, material);
        this.mesh.position.copy(this.position);
        scene.add(this.mesh);
      }

      update() {
        this.velocity.add(this.acceleration);
        this.velocity.clampLength(0.1, MAX_SPEED);
        
        this.position.add(this.velocity);
        this.mesh.position.copy(this.position);

        if (this.velocity.lengthSq() > 0.001) {
          tempSteer.copy(this.position).add(this.velocity);
          this.mesh.lookAt(tempSteer);
        }

        this.acceleration.set(0, 0, 0);
        this.wrapBoundaries();
      }

      applyForce(force) {
        this.acceleration.add(force);
      }

      interactWithPoint(target) {
        const dSq = this.position.distanceToSquared(target);
        if (dSq < 32 * 32 && dSq > 0) {
          tempDiff.subVectors(this.position, target);
          const d = Math.sqrt(dSq);
          tempDiff.normalize();
          const forceMagnitude = (32 - d) * 0.12;
          tempDiff.multiplyScalar(forceMagnitude);
          this.applyForce(tempDiff);
        }
      }

      wrapBoundaries() {
        const halfBounds = BOUNDS / 2;
        if (this.position.x > halfBounds) this.position.x = -halfBounds;
        if (this.position.x < -halfBounds) this.position.x = halfBounds;
        if (this.position.y > halfBounds) this.position.y = -halfBounds;
        if (this.position.y < -halfBounds) this.position.y = halfBounds;
        if (this.position.z > halfBounds) this.position.z = -halfBounds;
        if (this.position.z < -halfBounds) this.position.z = halfBounds;
      }

      flock(boidsList) {
        tempSep.set(0, 0, 0);
        tempAlign.set(0, 0, 0);
        tempCoh.set(0, 0, 0);

        let sepCount = 0;
        let alignCount = 0;
        let cohCount = 0;

        for (let i = 0; i < boidsList.length; i++) {
          const other = boidsList[i];
          if (other === this) continue;

          const dSq = this.position.distanceToSquared(other.position);

          if (dSq > 0) {
            if (dSq < SEPARATION_DIST_SQ) {
              tempDiff.subVectors(this.position, other.position);
              tempDiff.normalize();
              const d = Math.sqrt(dSq);
              tempDiff.divideScalar(d);
              tempSep.add(tempDiff);
              sepCount++;
            }
            if (dSq < ALIGN_DIST_SQ) {
              tempAlign.add(other.velocity);
              alignCount++;
            }
            if (dSq < COHESION_DIST_SQ) {
              tempCoh.add(other.position);
              cohCount++;
            }
          }
        }

        if (sepCount > 0) {
          tempSep.divideScalar(sepCount).normalize().multiplyScalar(MAX_SPEED).sub(this.velocity);
          tempSep.clampLength(0, MAX_FORCE);
          this.applyForce(tempSep.multiplyScalar(SEPARATION_WEIGHT));
        }
        if (alignCount > 0) {
          tempAlign.divideScalar(alignCount).normalize().multiplyScalar(MAX_SPEED).sub(this.velocity);
          tempAlign.clampLength(0, MAX_FORCE);
          this.applyForce(tempAlign.multiplyScalar(ALIGN_WEIGHT));
        }
        if (cohCount > 0) {
          tempCoh.divideScalar(cohCount);
          tempCoh.sub(this.position).normalize().multiplyScalar(MAX_SPEED).sub(this.velocity);
          tempCoh.clampLength(0, MAX_FORCE);
          this.applyForce(tempCoh.multiplyScalar(COHESION_WEIGHT));
        }
      }
    }

    // Initialize Three.js
    scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x08080a, 0.007);
    
    boidMaterialOrange = new THREE.MeshBasicMaterial({ 
      color: 0xff4800,
      wireframe: true,
      transparent: true,
      opacity: 0.8,
      blending: THREE.AdditiveBlending
    });

    boidMaterialCyan = new THREE.MeshBasicMaterial({ 
      color: 0x00ffff,
      wireframe: true,
      transparent: true,
      opacity: 0.8,
      blending: THREE.AdditiveBlending
    });

    const width = container.clientWidth;
    const height = container.clientHeight;
    
    camera = new THREE.PerspectiveCamera(60, width / height, 0.1, 1000);
    camera.position.z = 85;

    renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(1);
    container.appendChild(renderer.domElement);

    for (let i = 0; i < BOID_COUNT; i++) {
      const material = Math.random() > 0.5 ? boidMaterialOrange : boidMaterialCyan;
      boids.push(new Boid(material));
    }

    window.addEventListener('resize', () => {
      if (!container) return;
      const w = container.clientWidth;
      const h = container.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    });

    container.addEventListener('pointermove', (e) => {
      const rect = container.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      mouseActive = true;
    });

    container.addEventListener('pointerleave', () => {
      mouseActive = false;
    });

    const animate = () => {
      animationFrameId = requestAnimationFrame(animate);

      // Ambient camera drift from portfolio
      const time = Date.now() * 0.0001;
      camera.position.x = Math.sin(time) * 85;
      camera.position.z = Math.cos(time) * 85;
      camera.lookAt(scene.position);

      if (mouseActive) {
        raycaster.setFromCamera(mouse, camera);
        const targetPoint = new THREE.Vector3();
        raycaster.ray.at(65, targetPoint);

        for (let i = 0; i < boids.length; i++) {
          boids[i].interactWithPoint(targetPoint);
        }
      }

      for (let i = 0; i < boids.length; i++) {
        boids[i].flock(boids);
        boids[i].update();
      }

      renderer.render(scene, camera);
    };
    
    animate();

    // --- UI Logic ---
    const gridLines = document.querySelector('.grid-lines');
    for (let i = 1; i < 10; i++) {
      const hLine = document.createElement('div'); hLine.classList.add('h-line'); hLine.style.top = `${i * 10}%`; gridLines.appendChild(hLine);
      const vLine = document.createElement('div'); vLine.classList.add('v-line'); vLine.style.left = `${i * 10}%`; gridLines.appendChild(vLine);
    }
    
    const hebrewChars = 'אבגדהוזחטיכלמנסעפצקרשת';
    const main = document.querySelector('main');
    for (let i = 0; i < 8; i++) {
      const char = document.createElement('div'); char.classList.add('hebrew-char');
      char.textContent = hebrewChars[Math.floor(Math.random() * hebrewChars.length)];
      char.style.left = `${Math.random() * 80 + 10}%`; char.style.top = `${Math.random() * 80 + 10}%`;
      char.style.transform = `rotate(${Math.random() * 360}deg) scale(${Math.random() + 0.5})`;
      main.appendChild(char);
    }
    
    const timeDisplay = document.querySelector('.time');
    let totalSeconds = 24 * 3600 + 15 * 37;
    setInterval(() => {
      totalSeconds--;
      const h = Math.floor(totalSeconds / 3600); const m = Math.floor((totalSeconds % 3600) / 60); const s = totalSeconds % 60;
      timeDisplay.textContent = `T-MINUS ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }, 1000);

    // --- Dynamic Terminal ---
    const logs = [
      "0xSWRM01 > INITIATING MULTI-TARGET TRACKING", "0xSWRM02 > DEPLOYING DRONES...", "0xSWRM03 > ESTABLISHING COHESION MATRICES", "0xSWRM04 > CALCULATING ALIGNMENT VECTORS",
      "0xSWRM05 > SWARM DETECTED... COUNT: 80", "0xSWRM06 > TRACKING HOMING SIGNATURES", "0xSWRM07 > ALERT: EMERGENT BEHAVIOR OBSERVED", "0xSWRM08 > MAGI: BALTHASAR IS ANALYZING...",
      "0xSWRM09 > PROJECTING SWARM PATHWAY", "0xSWRM10 > TARGET ACQUISITION FAILURE", "0xSWRM11 > RE-CALIBRATING SENSORS", "0xSWRM12 > UNUSUAL FLOCKING INTELLIGENCE DETECTED",
      "0xSWRM13 > AT FIELD RESONANCE SPOTTED", "0xSWRM14 > AWAITING INTERCEPT COORDINATES"
    ];
    
    const terminal = document.getElementById('terminal');
    let logIndex = 0;
    let autoLogTimeoutId = null;
    
    function addLog(customMessage = null) {
      const line = document.createElement('div'); line.className = 'terminal-line'; 
      line.textContent = customMessage ? customMessage : logs[logIndex % logs.length];
      
      if (customMessage) {
        line.style.color = "var(--orange)";
      }
      
      if (terminal.children.length > 50) {
        terminal.removeChild(terminal.firstChild);
      }
      
      terminal.appendChild(line); terminal.scrollTop = terminal.scrollHeight;
      
      if (!customMessage) {
        logIndex++;
        autoLogTimeoutId = setTimeout(addLog, Math.random() * 800 + 200);
      }
    }
    addLog();

    // Gamified Command Line Interactivity
    const cmdInput = document.querySelector('.command-input');
    cmdInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        const val = this.value.trim().toUpperCase();
        if (val === '') return;
        
        addLog(`> USER_CMD: ${val}`);
        this.value = '';
        
        setTimeout(() => {
          if (val === 'SPHERE') {
            addLog("0xFF0000 > REDIRECTING TO SPHERE ANALYSIS...");
            setTimeout(() => window.location.href = 'evangelion-sphere-ui.html', 1000);
          } else if (val === 'GENOME' || val === 'DNA') {
            addLog("0xFF0000 > REDIRECTING TO GENOMIC ANALYSIS...");
            setTimeout(() => window.location.href = 'evangelion-dna-ui.html', 1000);
          } else if (val === 'CLEAR') {
            terminal.innerHTML = '';
            if (autoLogTimeoutId) clearTimeout(autoLogTimeoutId);
          } else if (val === 'HELP') {
            addLog('AVAILABLE: SPHERE | GENOME | DNA | SWARM | CLEAR | HELP');
          } else {
            addLog("0xFF0000 > COMMAND NOT RECOGNIZED BY MAGI SYSTEM");
            // Flash red
            document.body.style.background = 'rgba(255, 0, 0, 0.1)';
            setTimeout(() => document.body.style.background = 'var(--bg)', 200);
          }
        }, 500);
      }
    });
  </script>
</body>
</html>
